monolog:
    channels:
        - deprecation
        - security
        - app

    handlers:
        main:
            type: rotating_file
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            max_files: 14

        security:
            type: rotating_file
            path: "%kernel.logs_dir%/security.log"
            level: info
            channels: [security]

        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!console"]

        # Canal d alerte : en dev, les CRITICAL sont loggés dans un fichier dédié
        alert_dev:
            type: rotating_file
            path: "%kernel.logs_dir%/alert.log"
            level: critical
            max_files: 30