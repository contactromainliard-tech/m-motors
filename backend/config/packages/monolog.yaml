monolog:
    channels:
        - deprecation
        - security
        - app

    handlers:
        main:
            type: fingers_crossed
            action_level: error
            handler: nested
            excluded_http_codes: [404, 405]
            buffer_size: 50

        nested:
            type: rotating_file
            path: "%kernel.logs_dir%/%kernel.environment%.log"
            level: debug
            max_files: 14

        security:
            type: rotating_file
            path: "%kernel.logs_dir%/security.log"
            level: info
            channels: [security]

        console:
            type: console
            process_psr_3_messages: false
            channels: ["!event", "!doctrine", "!console"]

        deprecation:
            type: rotating_file
            path: "%kernel.logs_dir%/deprecation.log"
            channels: [deprecation]

    when@dev:
        monolog:
            handlers:
                main:
                    type: stream
                    path: "%kernel.logs_dir%/dev.log"
                    level: debug
                    channels: ["!event"]

    when@prod:
        monolog:
            handlers:
                main:
                    type: fingers_crossed
                    action_level: error
                    handler: nested
                    excluded_http_codes: [404, 405]
                    buffer_size: 50

                nested:
                    type: rotating_file
                    path: "%kernel.logs_dir%/prod.log"
                    level: debug
                    max_files: 14

                alert_email:
                    type: native_mailer
                    to: votre-email@mmotors.fr
                    from: alert@m-motors.impulsia-web.fr
                    subject: "[M-Motors] Erreur critique détectée"
                    level: critical
                    formatter: monolog.formatter.html
                    content_type: text/html